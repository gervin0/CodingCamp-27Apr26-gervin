<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Expense Tracker</h1>
    <div id="balance-display">Total: $0.00</div>
  </header>

  <main>
    <section aria-label="Add transaction">
      <form id="expense-form" novalidate>
        <div>
          <label for="name-input">Item Name</label>
          <input
            type="text"
            id="name-input"
            name="name"
            placeholder="e.g. Coffee"
            autocomplete="off"
          />
        </div>

        <div>
          <label for="amount-input">Amount ($)</label>
          <input
            type="number"
            id="amount-input"
            name="amount"
            placeholder="0.00"
            min="0.01"
            step="0.01"
          />
        </div>

        <div>
          <label for="category-select">Category</label>
          <select id="category-select" name="category">
            <option value="">-- Select category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </div>

        <p id="error-msg" role="alert" aria-live="polite"></p>

        <button type="button" id="add-btn">Add Transaction</button>
      </form>
    </section>

    <section aria-label="Transaction list">
      <h2>Transactions</h2>
      <ul id="transaction-list"></ul>
    </section>

    <section aria-label="Spending chart">
      <h2>Spending by Category</h2>
      <canvas id="spending-chart"></canvas>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
